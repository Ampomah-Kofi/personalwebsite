{{ define "main" }}
<div class="page-wrap">
  <div class="section-label">Countries Visited</div>

  <div class="card" style="padding:1.25rem 1.75rem;margin-bottom:1.25rem;">
    <p style="font-size:.9rem;color:#5f6368;margin:0;">4 countries across 3 continents</p>
  </div>

  <div class="country-grid">

    <div class="card country-card country-card--home">
      <span class="country-card__flag">🇬🇭</span>
      <div>
        <p class="country-card__name">Ghana</p>
        <p class="country-card__tag">Home country</p>
      </div>
    </div>

    <div class="card country-card">
      <span class="country-card__flag">🇺🇸</span>
      <div>
        <p class="country-card__name">USA</p>
        <p class="country-card__tag">Current residence</p>
      </div>
    </div>

    <div class="card country-card">
      <span class="country-card__flag">🇷🇼</span>
      <div>
        <p class="country-card__name">Rwanda</p>
        <p class="country-card__tag">East Africa</p>
      </div>
    </div>

    <div class="card country-card">
      <span class="country-card__flag">🇶🇦</span>
      <div>
        <p class="country-card__name">Qatar</p>
        <p class="country-card__tag">Middle East</p>
      </div>
    </div>

  </div>
</div>
{{ end }}
